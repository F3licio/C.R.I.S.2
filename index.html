<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>C.R.I.S</h1>
            <p>Bem vindo ao Banco de Informações das Missões e Agentes da Ordo Realitas</p>
        </div>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Digite seu nome" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" placeholder="Confirme sua senha" required>
            </div>
            <button type="submit" class="btn-login">Cadastrar</button>
            <div class="footer-link">
                Agente Encontrado <a href="https://f3licio.github.io/C.R.I.S/">Entrar</a>
            </div>
        </form>
    </div>
</body>
</html>
